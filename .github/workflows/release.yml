# Created by Pratik Sancheti / https://github.com/psancheti6666
name: release

# Builds the two per-arch DMGs (docs/macos-app.md, milestone 5).
#   - push of a v* tag: DMGs are attached to a DRAFT GitHub Release for that
#     tag — the maintainer reviews and publishes it manually.
#   - workflow_dispatch: DMGs are uploaded as workflow artifacts only.
# Models are never bundled (downloaded on first launch), so the build is just
# py2app + the pinned ollama runtime — no model downloads happen here.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  # PRs touching the Linux build run ONLY the linux job (the dmg jobs skip
  # below) — with no Linux dev hardware, the real build must run pre-merge,
  # not at tag time.
  pull_request:
    paths: ["linuxapp/**", "requirements.txt"]

permissions:
  contents: read

jobs:
  dmg:
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon (arm64) → MLX ASR backend
            arch: apple-silicon
          - os: macos-15-intel # Intel (x86_64) → ONNX ASR backend
            arch: intel # (macos-13, the old Intel label, is retired — jobs queue forever)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # build_app.sh reuses the project venv, same as a dev machine.
      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -r requirements.txt
      # Sign with the same self-signed "Sotto Dev" certificate as dev builds,
      # imported from repo secrets into a throwaway keychain. This does NOT
      # make Gatekeeper happy (users still go through Privacy & Security →
      # "Open Anyway", per the bundled README.txt) — it gives every release
      # the SAME designated requirement (bundle id + cert leaf), so macOS
      # keeps users' Accessibility/Input Monitoring grants across updates.
      # Without the secrets (e.g. forks) the release build FAILS — an ad-hoc
      # release has a per-build signature, so every update would silently
      # wipe users' grants (v0.3.0 shipped that way — issue #23). Forks that
      # want release builds must add their own cert secrets.
      - name: Import signing certificate
        env:
          SOTTO_SIGN_P12: ${{ secrets.SOTTO_SIGN_P12 }}
          SOTTO_SIGN_P12_PASSWORD: ${{ secrets.SOTTO_SIGN_P12_PASSWORD }}
        run: |
          if [ -z "$SOTTO_SIGN_P12" ]; then
            echo "no SOTTO_SIGN_P12 secret — release will be ad-hoc signed"
            exit 0
          fi
          KC="$RUNNER_TEMP/sotto-sign.keychain-db"
          KC_PASS="$(openssl rand -hex 16)"
          security create-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -lut 3600 "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          echo "$SOTTO_SIGN_P12" | base64 -d > "$RUNNER_TEMP/sotto-dev.p12"
          security import "$RUNNER_TEMP/sotto-dev.p12" -k "$KC" \
            -P "$SOTTO_SIGN_P12_PASSWORD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/sotto-dev.p12"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KC_PASS" "$KC" > /dev/null
          # prepend to the search list (keeping existing keychains) so
          # build_app.sh's `security find-identity` sees the identity
          security list-keychains -d user -s "$KC" \
            $(security list-keychains -d user | tr -d '"')
          # Trust the self-signed cert. Without this, `find-identity -p
          # codesigning -v` filters the identity out as invalid (a
          # self-signed cert is only "valid" where it's trusted) and the
          # v0.3.0 release shipped AD-HOC signed — wiping users' permission
          # grants on every update (issue #23).
          security find-certificate -c "Sotto Dev" -p "$KC" \
            > "$RUNNER_TEMP/sotto-dev.pem"
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain "$RUNNER_TEMP/sotto-dev.pem"
          # diagnostic: both lists must show the identity from here on
          echo "--- all codesigning identities:"
          security find-identity -p codesigning
          echo "--- valid codesigning identities:"
          security find-identity -p codesigning -v
      # SOTTO_RELEASE=1 builds the real "Sotto" (bundle id without the .dev
      # suffix, clean icon). Local default builds are "Sotto Dev" — a separate
      # app that coexists with an installed release copy.
      - name: Build Sotto.app
        run: ./macapp/build_app.sh
        env:
          SOTTO_RELEASE: "1"
      - name: Build DMG
        run: ./macapp/make_dmg.sh
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/Sotto-*.dmg
          if-no-files-found: error

  # Linux onedir build + smoke (docs/linux-app.md, L3). Artifact-only for
  # now — Linux release assets (.deb/AppImage) join the draft release at L6.
  linux:
    # ubuntu-22.04 = glibc 2.35 baseline: the bundle runs on Ubuntu 22.04+,
    # Debian 12+, Fedora 36+. If GitHub retires this label, a plain
    # `container: ubuntu:22.04` is NOT a drop-in replacement — it lacks sudo,
    # add-apt-repository (software-properties-common), and the gcc/binutils
    # toolchain the evdev compile and PyInstaller's binary analysis need;
    # budget a real migration, don't just swap the label.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      # deadsnakes matches the project's 3.11 pin AND guarantees a tkinter
      # built against the distro Tcl/Tk (setup-python builds may lack it).
      # python3.11-dev: evdev is sdist-only and compiles a C extension —
      # deadsnakes splits the headers out. libportaudio2 is what sotto.spec
      # copies into the bundle; xvfb runs the smoke checks headless.
      - name: Install Python 3.11 and build deps
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-venv python3.11-dev \
            python3.11-tk libportaudio2 xvfb
      - name: Build onedir and run smoke check
        run: ./linuxapp/build_app.sh
        env:
          PYTHON: python3.11
      - name: Pack onedir
        run: tar -C dist -czf dist/sotto-linux-x86_64-onedir.tar.gz sotto
      # The runner has libportaudio2 installed, so the build-time smoke can't
      # prove the BUNDLED copy is reachable (rthook_portaudio.py). Re-smoke
      # the tarball in a bare container with no libportaudio2: xvfb pulls in
      # the X client libs Tk needs; PortAudio must come from the bundle.
      - name: Smoke the tarball in a bare container (no system PortAudio)
        run: |
          docker run --rm -v "$PWD/dist:/dist:ro" ubuntu:22.04 bash -ec '
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
              xvfb libxft2 libxext6 >/dev/null
            tar -C /tmp -xzf /dist/sotto-linux-x86_64-onedir.tar.gz
            xvfb-run -a /tmp/sotto/sotto --smoke'
      - name: Upload onedir artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-onedir
          path: dist/sotto-linux-x86_64-onedir.tar.gz
          if-no-files-found: error

  # Tag builds gather both DMGs into one draft release. A single job (rather
  # than each matrix job uploading) avoids the draft-release race: drafts
  # don't enforce tag-name uniqueness, so two concurrent `gh release create`
  # calls could each make their own draft.
  release:
    needs: dmg
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the draft release and upload the DMGs
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dmg-*
          merge-multiple: true
          path: dmgs
      # $GITHUB_REF_NAME is runner-provided — no event-data interpolation.
      # Re-runs land in the `view` branch and just refresh the assets.
      - name: Create draft release with both DMGs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dmgs/*.dmg --clobber
          else
            gh release create "$GITHUB_REF_NAME" --draft --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --notes "Draft — release notes to be written before publishing." \
              dmgs/*.dmg
          fi
