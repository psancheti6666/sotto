# Created by Pratik Sancheti / https://github.com/psancheti6666
name: release

# Builds the two per-arch DMGs (docs/macos-app.md, milestone 5).
#   - push of a v* tag: DMGs are attached to a DRAFT GitHub Release for that
#     tag — the maintainer reviews and publishes it manually.
#   - workflow_dispatch: DMGs are uploaded as workflow artifacts only.
# Models are never bundled (downloaded on first launch), so the build is just
# py2app + the pinned ollama runtime — no model downloads happen here.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  # PRs touching anything the Linux build consumes run ONLY the linux job
  # (the dmg jobs skip below) — with no Linux dev hardware, the real build
  # must run pre-merge, not at tag time. sotto/** is included because the
  # bundle freezes the package: a source-only PR can break a hidden import
  # or the smoke and would otherwise only surface on the NEXT linuxapp PR.
  # The job costs ~3 min. logo/** feeds the deb icons; the workflow file
  # itself is listed so edits to these gates are exercised by their own PR.
  pull_request:
    paths:
      [
        "linuxapp/**",
        "requirements.txt",
        "sotto/**",
        "logo/**",
        ".github/workflows/release.yml",
      ]

permissions:
  contents: read

jobs:
  dmg:
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon (arm64) → MLX ASR backend
            arch: apple-silicon
          - os: macos-15-intel # Intel (x86_64) → ONNX ASR backend
            arch: intel # (macos-13, the old Intel label, is retired — jobs queue forever)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # build_app.sh reuses the project venv, same as a dev machine.
      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install -r requirements.txt
      # Sign with the same self-signed "Sotto Dev" certificate as dev builds,
      # imported from repo secrets into a throwaway keychain. This does NOT
      # make Gatekeeper happy (users still go through Privacy & Security →
      # "Open Anyway", per the bundled README.txt) — it gives every release
      # the SAME designated requirement (bundle id + cert leaf), so macOS
      # keeps users' Accessibility/Input Monitoring grants across updates.
      # Without the secrets (e.g. forks) the release build FAILS — an ad-hoc
      # release has a per-build signature, so every update would silently
      # wipe users' grants (v0.3.0 shipped that way — issue #23). Forks that
      # want release builds must add their own cert secrets.
      - name: Import signing certificate
        env:
          SOTTO_SIGN_P12: ${{ secrets.SOTTO_SIGN_P12 }}
          SOTTO_SIGN_P12_PASSWORD: ${{ secrets.SOTTO_SIGN_P12_PASSWORD }}
        run: |
          if [ -z "$SOTTO_SIGN_P12" ]; then
            echo "no SOTTO_SIGN_P12 secret — release will be ad-hoc signed"
            exit 0
          fi
          KC="$RUNNER_TEMP/sotto-sign.keychain-db"
          KC_PASS="$(openssl rand -hex 16)"
          security create-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -lut 3600 "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          echo "$SOTTO_SIGN_P12" | base64 -d > "$RUNNER_TEMP/sotto-dev.p12"
          security import "$RUNNER_TEMP/sotto-dev.p12" -k "$KC" \
            -P "$SOTTO_SIGN_P12_PASSWORD" -T /usr/bin/codesign
          rm "$RUNNER_TEMP/sotto-dev.p12"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KC_PASS" "$KC" > /dev/null
          # prepend to the search list (keeping existing keychains) so
          # build_app.sh's `security find-identity` sees the identity
          security list-keychains -d user -s "$KC" \
            $(security list-keychains -d user | tr -d '"')
          # Trust the self-signed cert. Without this, `find-identity -p
          # codesigning -v` filters the identity out as invalid (a
          # self-signed cert is only "valid" where it's trusted) and the
          # v0.3.0 release shipped AD-HOC signed — wiping users' permission
          # grants on every update (issue #23).
          security find-certificate -c "Sotto Dev" -p "$KC" \
            > "$RUNNER_TEMP/sotto-dev.pem"
          sudo security add-trusted-cert -d -r trustRoot \
            -k /Library/Keychains/System.keychain "$RUNNER_TEMP/sotto-dev.pem"
          # diagnostic: both lists must show the identity from here on
          echo "--- all codesigning identities:"
          security find-identity -p codesigning
          echo "--- valid codesigning identities:"
          security find-identity -p codesigning -v
      # SOTTO_RELEASE=1 builds the real "Sotto" (bundle id without the .dev
      # suffix, clean icon). Local default builds are "Sotto Dev" — a separate
      # app that coexists with an installed release copy.
      - name: Build Sotto.app
        run: ./macapp/build_app.sh
        env:
          SOTTO_RELEASE: "1"
      - name: Build DMG
        run: ./macapp/make_dmg.sh
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/Sotto-*.dmg
          if-no-files-found: error

  # Linux onedir build + smoke (docs/linux-app.md, L3). Artifact-only for
  # now — Linux release assets (.deb/AppImage) join the draft release at L6.
  linux:
    # ubuntu-22.04 = glibc 2.35 baseline: the bundle runs on Ubuntu 22.04+,
    # Debian 12+, Fedora 36+. If GitHub retires this label, a plain
    # `container: ubuntu:22.04` is NOT a drop-in replacement — it lacks sudo,
    # add-apt-repository (software-properties-common), and the gcc/binutils
    # toolchain the evdev compile and PyInstaller's binary analysis need;
    # budget a real migration, don't just swap the label.
    runs-on: ubuntu-22.04
    timeout-minutes: 30 # a hang must fail visibly, not sit for the 6h default
    steps:
      - uses: actions/checkout@v4
      # deadsnakes matches the project's 3.11 pin AND guarantees a tkinter
      # built against the distro Tcl/Tk (setup-python builds may lack it).
      # python3.11-dev: evdev is sdist-only and compiles a C extension —
      # deadsnakes splits the headers out. libportaudio2 is what sotto.spec
      # copies into the bundle; xvfb runs the smoke checks headless.
      - name: Install Python 3.11 and build deps
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-venv python3.11-dev \
            python3.11-tk libportaudio2 xvfb \
            libgirepository1.0-dev libcairo2-dev \
            gir1.2-ayatanaappindicator3-0.1 gir1.2-gtk-3.0
      - name: Build onedir and run smoke check
        run: ./linuxapp/build_app.sh
        env:
          PYTHON: python3.11
      - name: Pack onedir
        run: tar -C dist -czf dist/sotto-linux-x86_64-onedir.tar.gz sotto
      # The runner has libportaudio2 installed, so the build-time smoke can't
      # prove the BUNDLED copy is reachable (rthook_portaudio.py). Re-smoke
      # the tarball in a bare container with no libportaudio2: xvfb pulls in
      # the X client libs Tk needs; PortAudio must come from the bundle.
      - name: Smoke the tarball in a bare container (no system PortAudio)
        timeout-minutes: 10
        run: |
          docker run --rm -v "$PWD/dist:/dist:ro" ubuntu:22.04 bash -exc '
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              xvfb xauth libxft2 libxext6 libasound2
            tar -C /tmp -xzf /dist/sotto-linux-x86_64-onedir.tar.gz
            timeout -k 10 180 xvfb-run -a /tmp/sotto/sotto --smoke'
      # Build the .deb, then INSTALL it (runs the postinst as root, resolves
      # Depends) and smoke the installed launcher — proving the package is
      # actually installable and /usr/bin/sotto works with SOTTO_BUNDLE=deb.
      # imagemagick renders the hicolor icons.
      - name: Build .deb
        run: |
          sudo apt-get install -y imagemagick
          ./linuxapp/make_deb.sh
      # AppImage from the same onedir (L9): vendored hash-pinned static
      # runtime + mksquashfs — no build-time downloads.
      - name: Build AppImage
        run: |
          sudo apt-get install -y squashfs-tools
          ./linuxapp/make_appimage.sh
      # The static runtime needs no libfuse2; a bare container also has no
      # FUSE device at all, so the self-extraction fallback is what runs —
      # exactly what a locked-down desktop would hit. bundle=appimage proves
      # AppRun's export reaches the app (deb-smoke parity).
      - name: Smoke the AppImage in a bare container
        timeout-minutes: 10
        run: |
          docker run --rm -v "$PWD/dist:/dist:ro" ubuntu:22.04 bash -exc '
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              xvfb xauth libxft2 libxext6 libasound2
            cp /dist/Sotto-*-x86_64.AppImage /tmp/sotto.AppImage
            out=$(APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run -a /tmp/sotto.AppImage --smoke)
            echo "$out"
            grep -q "bundle=appimage" <<<"$out"'
      # The bootstrap, exercised as root exactly as the generic pkexec
      # prompt would run it (from a staged real-fs copy — firstrun stages
      # it off the FUSE mount for the same reason): assert the payload
      # lands with the deb's exact modes, twice (idempotent), and refuses
      # non-root. MUST run BEFORE the deb install below: the no-apt-helper
      # assertion would false-fail once the deb has laid that file down.
      - name: Verify the AppImage bootstrap installs the payload
        run: |
          cd "$RUNNER_TEMP"
          APPIMAGE_EXTRACT_AND_RUN=1 "$GITHUB_WORKSPACE"/dist/Sotto-*-x86_64.AppImage --appimage-extract >/dev/null 2>&1 || true
          test -x squashfs-root/bootstrap
          squashfs-root/bootstrap 2>&1 | grep -q "must run as root" || {
            echo "FAIL: bootstrap ran without root"; exit 1; }
          sudo squashfs-root/bootstrap
          sudo squashfs-root/bootstrap   # idempotent re-run must succeed
          test "$(stat -c '%U:%G %a' /usr/libexec/sotto/sotto-perms)" = "root:root 755"
          test "$(stat -c '%U:%G %a' /usr/libexec/sotto)" = "root:root 755"
          test "$(stat -c '%a' /usr/lib/udev/rules.d/60-sotto-input.rules)" = "644"
          test "$(stat -c '%a' /usr/share/polkit-1/actions/io.github.psancheti6666.sotto.policy)" = "644"
          # bootstrap must NOT install the apt-based updater helper
          test ! -e /usr/libexec/sotto/sotto-install-update
          cmp squashfs-root/setup/sotto-perms /usr/libexec/sotto/sotto-perms
      # Detached signature over the .deb — what sotto-install-update verifies
      # against the pinned pubkey before any self-update installs (L8).
      # Release/dispatch runs use the real key (step-scoped, wiped after;
      # verify-after-sign proves secret and committed pubkey are one pair).
      # PR runs (and forks) sign with an EPHEMERAL run-local key instead —
      # the gate test still exercises the full sign→verify machinery, but
      # the real private key never materializes outside tag/dispatch runs
      # (L8 security sweep). The ephemeral pubkey's presence in RUNNER_TEMP
      # tells the gate-test step to override the installed pin.
      - name: Sign the .deb
        env:
          SOTTO_DEB_SIGN_KEY: ${{ secrets.SOTTO_DEB_SIGN_KEY }}
          EVENT: ${{ github.event_name }}
        run: |
          umask 077
          # the key must not outlive this step even when a later line fails
          trap 'rm -f "$RUNNER_TEMP/deb-sign.pem"' EXIT
          if [ "$EVENT" = "pull_request" ] || [ -z "$SOTTO_DEB_SIGN_KEY" ]; then
            echo "PR/keyless run — signing with an ephemeral key"
            openssl genrsa -out "$RUNNER_TEMP/deb-sign.pem" 4096 2>/dev/null
            openssl rsa -in "$RUNNER_TEMP/deb-sign.pem" -pubout \
              -out "$RUNNER_TEMP/deb-sign.pub" 2>/dev/null
            pub="$RUNNER_TEMP/deb-sign.pub"
          else
            printf '%s\n' "$SOTTO_DEB_SIGN_KEY" > "$RUNNER_TEMP/deb-sign.pem"
            pub=linuxapp/deb/sotto-release.pub
          fi
          for f in dist/Sotto-*-amd64.deb dist/Sotto-*-x86_64.AppImage; do
            openssl dgst -sha256 -sign "$RUNNER_TEMP/deb-sign.pem" \
              -out "$f.sig" "$f"
            openssl dgst -sha256 -verify "$pub" -signature "$f.sig" "$f"
          done
          rm -f "$RUNNER_TEMP/deb-sign.pem"
      - name: Install the .deb and smoke the installed launcher
        run: |
          sudo apt-get install -y ./dist/Sotto-*-amd64.deb
          dpkg-deb --contents dist/Sotto-*-amd64.deb | grep -E ' \./usr/libexec/sotto/sotto-perms$'
          # the postinst's udev calls are no-ops on the runner (no udev) but
          # must not fail the install; verify the helper is root:root 0755
          test "$(stat -c '%U:%G %a' /usr/libexec/sotto/sotto-perms)" = "root:root 755"
          # every path the package installs must be free of setuid/setgid and
          # group/world-write (a setuid-root file is a privilege-escalation
          # surface; a writable root-owned file — worst of all the udev rule
          # or polkit policy — hands a local user root or the seat user's
          # execution; make_deb.sh strips/controls all of these modes).
          # Symlinks are excluded — their lstat mode is always 0777 — and get
          # their own containment check below.
          shopt -s nullglob
          roots=(/opt/sotto /usr/libexec/sotto /usr/bin/sotto
                 /usr/lib/udev/rules.d/60-sotto-input.rules
                 /usr/lib/modules-load.d/sotto-uinput.conf
                 /usr/share/polkit-1/actions/io.github.psancheti6666.sotto.policy
                 /usr/share/applications/sotto.desktop
                 /usr/share/icons/hicolor/*/apps/sotto.png)
          bad=$(find "${roots[@]}" \( -type f -o -type d \) \( -perm /6000 -o -perm /022 \) -print)
          [ -z "$bad" ] || { echo "FILES WITH BAD MODES:"; echo "$bad"; exit 1; }
          # payload symlinks (PyInstaller emits relative lib links) must
          # resolve inside the installed tree — one pointing at /tmp or a
          # home dir would let a local user swap code the seat user runs
          while IFS= read -r l; do
            t=$(readlink -f "$l" || true)
            case "$t" in
              /opt/sotto/*|/usr/libexec/sotto/*) ;;
              *) echo "SYMLINK ESCAPES TREE: $l -> $t"; exit 1 ;;
            esac
          done < <(find /opt/sotto /usr/libexec/sotto -type l)
          # no SOTTO_BUNDLE in the env — the smoke line's bundle= value can
          # only come from the launcher's own export, so grepping it proves
          # the export actually reaches the app
          out=$(xvfb-run -a /usr/bin/sotto --smoke)
          echo "$out"
          grep -q "bundle=deb" <<<"$out"
      # The self-update gate, exercised root-side exactly as pkexec would run
      # it (sudo stands in for pkexec — no polkit agent on a runner). Both
      # cases must REFUSE: a tampered .deb fails signature verification, and
      # a genuine .deb of the already-installed version trips the downgrade
      # guard — which also proves its signature check PASSED first.
      - name: Verify the install-update signature gate
        run: |
          sig=(dist/Sotto-*-amd64.deb.sig)
          deb=(dist/Sotto-*-amd64.deb)
          if [ -f "$RUNNER_TEMP/deb-sign.pub" ]; then
            # PR run: the .sig is from the ephemeral key — repoint the
            # installed pin at it (runner-only mutation) so the gate test
            # exercises the helper exactly as a real update would
            sudo cp "$RUNNER_TEMP/deb-sign.pub" /usr/share/sotto/sotto-release.pub
          fi
          cp "${deb[0]}" /tmp/tampered.deb
          printf x >> /tmp/tampered.deb
          if sudo /usr/libexec/sotto/sotto-install-update /tmp/tampered.deb "${sig[0]}"; then
            echo "FAIL: tampered .deb was accepted"; exit 1
          fi
          out=$(sudo /usr/libexec/sotto/sotto-install-update "${deb[0]}" "${sig[0]}" 2>&1) \
            && { echo "FAIL: same-version reinstall was accepted"; exit 1; }
          grep -q "not newer than installed" <<<"$out"
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            dist/sotto-linux-x86_64-onedir.tar.gz
            dist/Sotto-*-amd64.deb
            dist/Sotto-*-amd64.deb.sig
            dist/Sotto-*-x86_64.AppImage
            dist/Sotto-*-x86_64.AppImage.sig
          if-no-files-found: error

  # Tag builds gather both DMGs into one draft release. A single job (rather
  # than each matrix job uploading) avoids the draft-release race: drafts
  # don't enforce tag-name uniqueness, so two concurrent `gh release create`
  # calls could each make their own draft.
  release:
    needs: [dmg, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the draft release and upload the assets
    steps:
      - name: Download release artifacts (DMGs + .deb)
        uses: actions/download-artifact@v4
        with:
          pattern: "{dmg-*,linux-deb}"
          merge-multiple: true
          path: assets
      # $GITHUB_REF_NAME is runner-provided — no event-data interpolation.
      # Re-runs land in the `view` branch and just refresh the assets. The
      # onedir tarball is a CI/friend-test artifact, not a release asset —
      # only the DMGs and the .deb go on the release.
      - name: Create draft release with the DMGs and .deb
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              assets/*.dmg assets/*.deb assets/*.AppImage assets/*.sig --clobber
          else
            gh release create "$GITHUB_REF_NAME" --draft --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --notes "Draft — release notes to be written before publishing." \
              assets/*.dmg assets/*.deb assets/*.AppImage assets/*.sig
          fi
