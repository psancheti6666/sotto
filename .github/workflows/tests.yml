name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  units:
    # Unit tier only: no models, no Ollama, no mic — see tests/test_pipeline.py.
    strategy:
      fail-fast: false
      matrix:
        # windows-latest: docs/windows-app.md W1 — the unit tier is the
        # Windows regression gate for every later PR (no local hardware)
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PortAudio (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libportaudio2
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run unit tests
        run: python tests/test_pipeline.py
      # everything under linuxapp/deb/ runs as ROOT on user machines —
      # shellcheck is a merge gate for it (runner has shellcheck preinstalled)
      - name: Shellcheck root-executed and build shell
        if: runner.os == 'Linux'
        # ALL shell in linuxapp/deb/ (the comment above used to promise this
        # while gating one file — sotto-install-update joining in L8 exposed
        # the gap) + the build scripts. Keep in sync with preflight.sh.
        run: >
          shellcheck linuxapp/deb/sotto-perms linuxapp/deb/sotto-install-update
          linuxapp/deb/postinst linuxapp/deb/prerm linuxapp/deb/postrm
          linuxapp/deb/sotto-launcher linuxapp/appimage/bootstrap
          linuxapp/appimage/AppRun linuxapp/build_app.sh linuxapp/make_deb.sh
          linuxapp/make_appimage.sh
